services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: sabilearn
      POSTGRES_PASSWORD: sabilearn
      POSTGRES_DB: sabilearn
    ports:
      - "5433:5432"
    volumes:
      - sabilearn-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sabilearn"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  sabilearn-db-data:
